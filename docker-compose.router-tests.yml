services:
  i2p-router:
    build:
      context: .
      dockerfile: Dockerfile.i2p-router
    image: go-streaming/i2p-router:local
    environment:
      - JVM_XMX=256m

  router-tests:
    build:
      context: .
      dockerfile: Dockerfile.router-tests
    image: go-streaming/router-tests:local
    depends_on:
      - i2p-router
    environment:
      - I2CP_HOST=i2p-router
      - I2CP_PORT=7654
      - ROUTER_START_TIMEOUT_SECONDS=180
    # Intentionally no published ports.
